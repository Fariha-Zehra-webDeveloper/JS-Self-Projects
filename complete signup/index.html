<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
 
    <div class="wrapper" id="login-form" style="display:none">
        <h2>Sign In </h2>
           <div class="username">
    <label for="user">Username</label>
    <div class="inp-grp">
        <input type="text" class="name" id="login-user">
    </div>
</div>
<div class="password">
    <label for="pass">Password</label>
    <div class="inp-grp">
        <input type="password" class="pass" id="login-pass">
        <i class="fa-regular fa-eye-slash" id="login-eye"></i>
    </div>
</div>
            <div class="forget">
                <a href="" class="p-forget">Forget Password?</a>
                <a href="" class="sign">Signup</a>
            </div>
            <button class="login-btn">Login</button> 
    </div>
    
    <div class="wrapper" id="forget-form" style="display: none;">
    <h2>Reset Password</h2>
    <div class="email">
        <label>Enter Registered Email</label>
        <div class="inp-grp">
            <input type="email" class="email-inp" id="forget-email">
        </div>
    </div>
    <button class="login-btn" id="reset-btn">Reset</button>
    <div class="footer">
        <a href="" class="back-to-login">Back to <span>Login</span></a>
    </div>
</div>

    <div class="wrapper" id="signup-form" >
         <h2>Sign Up </h2>
           <div class="username">
    <label for="user">Username</label>
    <div class="inp-grp">
        <input type="text" class="name" id="user">
    </div>
</div>
<div class="email">
    <label >Email</label>
    <div class="inp-grp">
        <input type="email" class="email-inp" id="email">
    </div>
</div>
<div class="password">
    <label for="pass">Password</label>
    <div class="inp-grp">
        <input type="password" class="pass" id="pass">
        <i class="fa-regular fa-eye-slash" id="signup-eye"></i>
    </div>
</div>
<div class="conf-pass">
    <label for="pass">Confirm Password</label>
    <div class="inp-grp">
        <input type="password" class="conf-pass-inp" id="conf-pass">
        <i class="fa-regular fa-eye-slash" id="conf-eye"></i>
    </div>
</div>

    <button class="sign-btn">Signup</button> 
  <div class="footer">
        <a href="" class="account">Already have account? <span>Login</span> </a>
    </div>
    </div>

<div class="success-box" id="success-box" style="display:none">
        <div class="success-icon">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        <h3 id="success-msg">Signup Successful!</h3>
        <p>Welcome back!</p>
        <button class="login-btn" id="continue-btn">Continue</button>
    </div>
    <div class="success-box error-box" id="error-box" style="display:none; border-color: rgb(69, 244, 254); box-shadow: 0 0 1em 0.25em rgb(69, 244, 254);">
    <div class="success-icon">
        <i class="fa-solid fa-circle-exclamation" style="color: rgb(69, 244, 254); text-shadow: 0 0 0.5em rgb(69, 244, 254);"></i>
    </div>
    <h3 style="color: rgb(69, 244, 254); text-shadow: 0 0 0.5em rgb(69, 244, 254);">Error!</h3>
    <p id="error-msg">Something went wrong.</p>
    <button class="login-btn" id="close-error" style="border-color: rgb(69, 244, 254); color: rgb(69, 244, 254); box-shadow: 0 0 1em 0.25em rgb(69, 244, 254);">Close</button>
</div>
    <script src="script.js"></script>
</body>
</html>
