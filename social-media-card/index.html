<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>likes card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="status-msg" id="status-msg">Post Saved!</div>
    <div class="wrapper">
      <div class="card">
          <div class="bottom">
            <div class="icons">
                  <div class="icon">
                     <i class="fa-regular fa-heart fa-solid"></i>
                     <span id="like-count">like 0</span>
                  </div>
                   <div class="icon">
                       <i class="fa-regular fa-comment fa-solid"></i>
                       <span>comment</span>
                   </div>
                    <div class="icon">
                       <i class="fa-regular fa-paper-plane fa-solid"></i>
                       <span>share</span>
                    </div>
                   <div class="icon">
                        <i class="fa-regular fa-bookmark fa-solid"></i>
                        <span>save</span>
                   </div>
            </div>
            </div>
    </div>
    <div class="user-comment" id="display-comment">No Comments yet...</div>
    </div>   
    <script src="script.js"></script>
</body>
</html>
